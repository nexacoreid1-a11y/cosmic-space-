<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cosmic Space - Solar System 3D</title>

<style>
  body { margin:0; overflow:hidden; background:black; font-family:Arial; }
  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
  }
  h1 { margin:0; font-size:20px; }
  p { margin:5px 0; font-size:12px; color:#aaa; }
</style>
</head>

<body>

<div id="ui">
  <h1>🚀 Cosmic Space</h1>
  <p>Solar System 3D</p>
</div>

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 50, 120);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
scene.add(light);

// SUN
const sunGeometry = new THREE.SphereGeometry(10, 32, 32);
const sunMaterial = new THREE.MeshBasicMaterial({color: 0xffaa00});
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
scene.add(sun);

// STARS
const starGeometry = new THREE.BufferGeometry();
const starCount = 1000;
const positions = [];

for(let i=0;i<starCount;i++){
  positions.push((Math.random()-0.5)*2000);
  positions.push((Math.random()-0.5)*2000);
  positions.push((Math.random()-0.5)*2000);
}

starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

const starMaterial = new THREE.PointsMaterial({color:0xffffff});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// PLANET FUNCTION
function createPlanet(size, color, distance, speed){
  const geometry = new THREE.SphereGeometry(size, 32, 32);
  const material = new THREE.MeshStandardMaterial({color});
  const planet = new THREE.Mesh(geometry, material);

  const pivot = new THREE.Object3D();
  scene.add(pivot);
  pivot.add(planet);

  planet.position.x = distance;

  return { planet, pivot, speed };
}

// PLANETS
const planets = [
  createPlanet(2, 0xaaaaaa, 20, 0.02), // Mercury
  createPlanet(3, 0xffcc99, 30, 0.015), // Venus
  createPlanet(3.2, 0x3399ff, 40, 0.01), // Earth
  createPlanet(2.5, 0xff3300, 50, 0.008), // Mars
  createPlanet(6, 0xff9966, 70, 0.006), // Jupiter
  createPlanet(5, 0xffcc66, 90, 0.005), // Saturn
  createPlanet(4, 0x66ccff, 110, 0.004), // Uranus
  createPlanet(4, 0x3366ff, 130, 0.003)  // Neptune
];

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  // rotate sun
  sun.rotation.y += 0.002;

  // orbit planets
  planets.forEach(p=>{
    p.pivot.rotation.y += p.speed;
    p.planet.rotation.y += 0.01;
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
